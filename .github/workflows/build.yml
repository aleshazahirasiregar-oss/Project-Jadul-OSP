name: Build Android App

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Wrapper & Build
      run: |
        # 1. Hapus semua file wrapper yang rusak/bermasalah
        rm -rf gradle/wrapper/*
        
        # 2. Paksa Gradle membuat ulang wrapper yang sehat
        # Ini akan menimpa file jar yang error dengan file yang valid
        gradle wrapper --gradle-version 8.7
        
        # 3. Beri akses penuh agar tidak ada lagi "Permission Denied"
        chmod +x gradlew
        chmod -R 777 .
        
        # 4. Bersihkan sisa-sisa perang
        sudo rm -rf /home/runner/.gradle/caches/
        rm -rf app/build/
        
        # 5. Eksekusi build tanpa menyentuh jar yang corrupt
        ./gradlew assembleDebug --no-daemon

    - name: Upload hasil build
      uses: actions/upload-artifact@v4
      with:
        name: Youtube_Go_OSP
        path: app/build/outputs/apk/debug/app-debug.apk
        

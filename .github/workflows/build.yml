name: Build Android App

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Pembersihan & Persiapan Tempur
      run: |
        # 1. Bersihkan sisa perang
        sudo rm -rf /home/runner/.gradle/caches/
        rm -rf app/build/
        
        # 2. Cari file .jar asli dari folder gradle (jika ada) atau biarkan sistem mencari
        # Kita buat direktori wrapper
        mkdir -p gradle/wrapper
        
        # 3. PENGGANTI OTOMATIS: 
        # Jika file jar tidak ada, kita download langsung file jar-nya dari sumber resmi
        # Ini jauh lebih pasti daripada unzip zip besar
        curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        
        # 4. Beri akses penuh
        chmod -R 777 .
        chmod +x ./gradlew

    - name: Build dengan Gradle
      run: |
        # Jalankan build
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload hasil build
      uses: actions/upload-artifact@v4
      with:
        name: Youtube_Go_OSP
        path: app/build/outputs/apk/debug/app-debug.apk
        

name: Build YouTube Go OSP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ekstrem Build Force
        run: |
          # Buang semua sisa-sisa file Gradle yang lama (penyebab utama error 126)
          rm -rf gradlew gradle/
          
          # Paksa sistem buat wrapper baru yang fresh dan benar
          gradle wrapper --gradle-version 8.5 --distribution-type all
          
          # Jalankan build dengan file yang baru dibuat oleh sistem (sudah pasti punya izin eksekusi)
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeGo-OSP
          path: app/build/outputs/apk/debug/app-debug.apk
          

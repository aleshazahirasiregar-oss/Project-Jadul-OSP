name: Build Android App

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Wrapper & Build (Full Fix)
      run: |
        # 1. Bersihkan lingkungan
        rm -rf gradle/wrapper/*
        mkdir -p gradle/wrapper
        
        # 2. Download Gradle 8.7 Binary (Pasti ada filenya, bukan 404)
        curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle-8.7.zip
        unzip -q gradle-8.7.zip
        
        # 3. Ambil file JAR dari hasil unzip tadi (Tidak akan 404!)
        cp gradle-8.7/lib/gradle-wrapper-8.7.jar gradle/wrapper/gradle-wrapper.jar
        
        # 4. Buat file konfigurasi yang tepat
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        
        # 5. Pastikan semua file punya izin eksekusi
        chmod +x gradlew
        chmod -R 777 .
        
        # 6. Bersihkan cache sistem
        sudo rm -rf /home/runner/.gradle/caches/
        rm -rf app/build/
        
        # 7. Eksekusi Build
        ./gradlew assembleDebug --no-daemon

    - name: Upload hasil build
      uses: actions/upload-artifact@v4
      with:
        name: Youtube_Go_OSP
        path: app/build/outputs/apk/debug/app-debug.apk
        

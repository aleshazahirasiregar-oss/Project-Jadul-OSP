name: Build YouTube Go OSP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Fix Permissions
        run: |
          # Hapus file wrapper yang rusak dari hasil upload manual
          rm -rf gradle/wrapper/gradle-wrapper.jar
          # Download ulang versi bersih
          mkdir -p gradle/wrapper
          wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          # Kasih izin eksekusi paksa
          chmod +x gradlew
          chmod +x gradle/wrapper/gradle-wrapper.jar

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeGo-OSP
          path: app/build/outputs/apk/debug/app-debug.apk
          

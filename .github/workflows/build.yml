name: Build YouTube Go OSP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Timeout 10 menit agar sistem punya waktu cukup untuk build
    timeout-minutes: 10 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ekstrem Build Force
        run: |
          # Pembersihan total sisa file lama
          rm -rf gradlew gradle/
          
          # Paksa sistem buat wrapper baru yang sehat
          gradle wrapper --gradle-version 8.5 --distribution-type all
          
          # Eksekusi build dengan file fresh
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeGo-OSP
          path: app/build/outputs/apk/debug/app-debug.apk
          

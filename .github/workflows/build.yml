name: Build Android App

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Wrapper & Build
      run: |
        # 1. Hapus wrapper yang rusak
        rm -rf gradle/wrapper/*
        
        # 2. Paksa download dan gunakan wrapper versi 8.7 yang stabil
        # Kita panggil langsung jar-nya agar sistem tidak mengambil Gradle 9
        curl -L https://raw.githubusercontent.com/gradle/gradle/v8.7/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        
        # 3. Buat properti file agar wrapper tahu dia harus pakai versi 8.7
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/gradle-8.7-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

        # 4. Beri akses
        chmod +x gradlew
        chmod -R 777 .
        
        # 5. Build dengan versi 8.7
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload hasil build
      uses: actions/upload-artifact@v4
      with:
        name: Youtube_Go_OSP
        path: app/build/outputs/apk/debug/app-debug.apk
        

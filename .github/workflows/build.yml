name: Build Android App

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: (1) Checkout code
      uses: actions/checkout@v4

    - name: (2) Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: (3) Fix Wrapper & Build (Radar Mode)
      run: |
        # 1. Bersihkan lingkungan awal termasuk gradlew yang rusak
        rm -rf gradle/wrapper/*
        rm -f gradlew
        mkdir -p gradle/wrapper
        
        # 2. Download Paket Resmi Gradle 8.7
        curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle-8.7.zip
        unzip -q gradle-8.7.zip
        
        # 3. AMBIL REGENERASI: Salin file gradlew dan jar asli yang 100% sehat dari hasil ekstrak
        cp gradle-8.7/bin/gradlew ./gradlew
        find gradle-8.7/ -name "gradle-wrapper*.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
        
        # 4. Buat file konfigurasi properti yang pas
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        
        # 5. Pastikan hak akses penuh dibuka total untuk gradlew yang baru
        chmod +x gradlew
        chmod -R 777 .
        
        # 6. Bersihkan sisa cache
        sudo rm -rf /home/runner/.gradle/caches/
        rm -rf app/build/
        
        # 7. Hajar Build dengan script yang baru lahir!
        ./gradlew assembleDebug --no-daemon

    - name: (4) Upload hasil build
      uses: actions/upload-artifact@v4
      with:
        name: Youtube_Go_OSP
        path: app/build/outputs/apk/debug/app-debug.apk
